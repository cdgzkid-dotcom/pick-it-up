name: Weekly Calibration

on:
  schedule:
    # Mondays 6 AM CST (12:00 UTC). Recalibrates system_weights from
    # factor_performance and posts the weekly Telegram summary.
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger calibration
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing APP_URL or CRON_SECRET secrets"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$APP_URL/api/cron/calibrate")
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "HTTP $status"
          echo "$body"
          if [ "$status" -ge 400 ]; then
            exit 1
          fi
